name: Flutter Release Workflow

on:
  push:
    branches:
      - master
    paths:
      - 'pubspec.yaml'
      - '**/*.dart'
      - '**/*.yml'
  workflow_dispatch:

permissions: write-all

jobs:
  flutter:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2
        with:
          fetch-depth: 0  # Fetch all history and tags

      - name: Check if version is increased
        id: version-check
        run: |
          NEW_VERSION=$(sed -n 's/^version:[[:space:]]*\(.*\)/\1/p' pubspec.yaml)
          PREVIOUS_VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "New version: $NEW_VERSION"
          echo "Previous version: $PREVIOUS_VERSION"

          if [ "v$NEW_VERSION" == "$PREVIOUS_VERSION" ]; then
            echo "No new version detected."
            exit 0
          else
            echo "New version detected: $NEW_VERSION"
          fi

          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV
          echo "PREVIOUS_VERSION=$PREVIOUS_VERSION" >> $GITHUB_ENV
          echo "::set-output name=NEW_VERSION::$NEW_VERSION"
          echo "::set-output name=PREVIOUS_VERSION::$PREVIOUS_VERSION"

      - name: Generate changelog
        id: changelog
        run: |
          echo "Generating changelog..."
          echo "Release Notes:" > release_notes.txt
          echo "----------------------" >> release_notes.txt

          TAGS=$(git tag --sort=-version:refname)
          if [ -z "$TAGS" ]; then
            echo "[Current]" >> release_notes.txt
            GIT_PAGER=cat git log --no-merges --format=" * %s" >> release_notes.txt
          else
            NEXT=""
            echo "$TAGS" | while read TAG; do
              echo "" >> release_notes.txt
              if [ -n "$NEXT" ]; then
                echo "[$NEXT]" >> release_notes.txt
              else
                echo "[Current]" >> release_notes.txt
              fi
              GIT_PAGER=cat git log --no-merges --format=" * %s" ${TAG}..${NEXT} >> release_notes.txt
              NEXT=$TAG
            done

            FIRST=$(echo "$TAGS" | tail -1)
            echo "" >> release_notes.txt
            echo "[$FIRST]" >> release_notes.txt
            GIT_PAGER=cat git log --no-merges --format=" * %s" $FIRST >> release_notes.txt
          fi

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.1'

      - name: Cache Flutter dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-flutter-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: |
            ${{ runner.os }}-flutter-

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set JAVA_HOME environment variable
        run: echo "JAVA_HOME=${{ env.JAVA_HOME }}" >> $GITHUB_ENV

      - name: Update Gradle Java Home
        run: |
          if [ -f android/gradle.properties ]; then
            sed -i "s|org.gradle.java.home=.*|org.gradle.java.home=$JAVA_HOME|" android/gradle.properties || 
              echo "org.gradle.java.home=$JAVA_HOME" >> android/gradle.properties
          else
            mkdir -p android
            echo "org.gradle.java.home=$JAVA_HOME" > android/gradle.properties
          fi

      - name: Run Dart fix and format
        run: |
          flutter pub get
          dart fix --apply
          dart format .

      - name: Build APK
        run: flutter build apk --release

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.version-check.outputs.NEW_VERSION }}"
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            release_notes.txt
          body_file: release_notes.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}