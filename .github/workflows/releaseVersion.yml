name: Flutter Release Workflow

on:
  push:
    branches:
      - master
    paths:
      - 'pubspec.yaml'
      - '**/*.dart'
permissions:
  contents: write
jobs:
  flutter:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Check if version is increased
        id: version-check
        run: |
          # Fetch current version from pubspec.yaml
          NEW_VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //g' | tr -d ' ')
          # Fetch the previous version (you can store it in a file or use Git tags)
          PREVIOUS_VERSION=$(git tag -l | grep -Eo '[0-9]+\.[0-9]+\.[0-9]+(\+[0-9]+)?' | sort -V | tail -n 1)
          echo "New version: $NEW_VERSION"
          echo "Previous version: $PREVIOUS_VERSION"

          # Check if the version has increased (including build number changes)
          if [ "$NEW_VERSION" == "$PREVIOUS_VERSION" ]; then
            echo "No new version detected."
            exit 0
          else
            echo "New version detected: $NEW_VERSION"
          fi

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.1'

      - name: Cache Flutter dependencies
        uses: actions/cache@v2
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-flutter-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: |
            ${{ runner.os }}-flutter-

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set JAVA_HOME environment variable
        run: echo "JAVA_HOME=${{ env.JAVA_HOME }}" >> $GITHUB_ENV

      - name: Update Gradle Java Home
        run: |
          if [ -f android/gradle.properties ]; then
            if grep -q "org.gradle.java.home" android/gradle.properties; then
              sed -i "s|org.gradle.java.home=.*|org.gradle.java.home=$JAVA_HOME|" android/gradle.properties
            else
              echo "org.gradle.java.home=$JAVA_HOME" >> android/gradle.properties
            fi
          else
            echo "org.gradle.java.home=$JAVA_HOME" > android/gradle.properties
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Run Dart fix and format
        run: |
          flutter pub get
          dart fix --apply
          dart format .

      - name: Generate changelog
        id: changelog
        run: |
          # Generate a list of commits since the last tag
          COMMITS=$(git log ${{ steps.version-check.outputs.PREVIOUS_VERSION }}..HEAD --pretty=format:'- %s')
          echo "COMMITS=$COMMITS" >> $GITHUB_ENV
      - name: Tag version and push
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git tag "v${NEW_VERSION}"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git "v${NEW_VERSION}"
      - name: Fetch tags again to ensure latest tag is available
        run: git fetch --tags
      - name: Build release APK
        run: flutter build apk --release --dart-define=GEONAMES_API_USER=humanbot000

      - name: Create GitHub release
        uses: softprops/action-gh-release@v1
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
