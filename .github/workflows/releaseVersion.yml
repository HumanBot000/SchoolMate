name: Flutter Release Workflow

on:
  push:
    branches:
      - master
    paths:
      - 'pubspec.yaml'
      - '**/*.dart'

jobs:
  flutter:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.1'

      - name: Check Flutter version
        run: flutter --version  # Check if Flutter is correctly installed

      - name: Cache Flutter dependencies
        uses: actions/cache@v2
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-flutter-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: |
            ${{ runner.os }}-flutter-

      - name: Install OpenJDK 17
        run: |
          sudo apt update
          sudo apt install -y openjdk-17-jdk

      - name: Set JAVA_HOME environment variable
        run: |
          echo "JAVA_HOME=$(dirname $(dirname $(readlink -f $(which java))))" >> $GITHUB_ENV

      - name: Unset or Modify Gradle Java Home (if exists)
        run: |
          # If gradle.properties contains org.gradle.java.home, we need to unset or modify it
          if [ -f gradle.properties ]; then
            sed -i '/org.gradle.java.home/d' gradle.properties  # Remove the Java home property
            echo "org.gradle.java.home=$JAVA_HOME" >> gradle.properties  # Ensure it points to the correct JAVA_HOME
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Check if version is increased
        id: version-check
        run: |
          # Fetch current version from pubspec.yaml
          NEW_VERSION=$(grep 'version:' pubspec.yaml | sed 's/version: //')
          
          # Fetch the previous version (you can store it in a file or use Git tags)
          PREVIOUS_VERSION=$(git tag -l | grep -Eo '[0-9]+\.[0-9]+\.[0-9]+(\+[0-9]+)?' | sort -V | tail -n 1)

          echo "New version: $NEW_VERSION"
          echo "Previous version: $PREVIOUS_VERSION"

          # Check if the version has increased (including build number changes)
          if [ "$NEW_VERSION" == "$PREVIOUS_VERSION" ]; then
            echo "No new version detected."
            exit 0
          else
            echo "New version detected: $NEW_VERSION"
          fi

      - name: Run Dart fix and format
        run: |
          flutter pub get
          dart fix --apply
          dart format .

      - name: Generate changelog
        id: changelog
        run: |
          # Generate a list of commits since the last tag
          COMMITS=$(git log ${{ steps.version-check.outputs.PREVIOUS_VERSION }}..HEAD --pretty=format:'- %s')
          echo "COMMITS=$COMMITS" >> $GITHUB_ENV

      - name: Build release APK
        run: flutter build apk --release --dart-define=GEONAMES_API_USER=humanbot000

      - name: Create GitHub release
        uses: softprops/action-gh-release@v1
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag version and push
        run: |
          git tag "v${NEW_VERSION}"
          git push origin "v${NEW_VERSION}"
