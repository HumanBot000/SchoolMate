name: Auto-generate PR using Aider
on:
  issues:
    types: [labeled]

jobs:
  generate:
    uses: mirrajabi/aider-github-workflows/.github/workflows/aider-issue-to-pr.yml@main
    if: github.event.label.name == 'aider'
    with:
      issue-number: ${{ github.event.issue.number }}
      base-branch: ${{ github.event.repository.default_branch }}
      model: command-r-plus-08-2024
      aider_args: "--yes --message 'we only care about .dart files. Do not change files that were auto-generated by flutter (e.g. but not exclusively *.js, *.java,...)'"
    secrets: 
      cohere_api_key: ${{ secrets.COHERE_API_KEY }}
    permissions:
      contents: write
      issues: read
      pull-requests: write
